<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" />
      <stop offset="100%" style="stop-color:#1e1b4b" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="50%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#a855f7" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative grid dots -->
  <g opacity="0.1">
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#ffffff" />
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)" />
  </g>

  <!-- Accent line -->
  <rect x="80" y="180" width="120" height="6" rx="3" fill="url(#accent)" />

  <!-- Main title -->
  <text x="80" y="260" font-family="'Inter', 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-1.5">
    Subelza CG
  </text>

  <!-- Subtitle -->
  <text x="80" y="320" font-family="'Inter', 'Segoe UI', sans-serif" font-size="32" font-weight="500" fill="#94a3b8" letter-spacing="-0.5">
    Consultora de Ingeniería de Software
  </text>

  <!-- Services tags -->
  <g transform="translate(80, 380)">
    <rect x="0" y="0" width="80" height="36" rx="18" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1" />
    <text x="40" y="24" font-family="'Inter', 'Segoe UI', sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle">IA</text>

    <rect x="96" y="0" width="140" height="36" rx="18" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="1" />
    <text x="166" y="24" font-family="'Inter', 'Segoe UI', sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle">RPA / Automatización</text>

    <rect x="252" y="0" width="120" height="36" rx="18" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1" />
    <text x="312" y="24" font-family="'Inter', 'Segoe UI', sans-serif" font-size="14" fill="#c084fc" text-anchor="middle">Desarrollo Web</text>
  </g>

  <!-- URL at bottom -->
  <text x="80" y="560" font-family="'Inter', 'Segoe UI', sans-serif" font-size="20" fill="#64748b">
    subelzacg.com.ar
  </text>

  <!-- Accent pill at top-right -->
  <g transform="translate(1080, 60)">
    <rect x="0" y="0" width="60" height="60" rx="30" fill="url(#accent)" opacity="0.3" />
    <rect x="10" y="10" width="40" height="40" rx="20" fill="url(#accent)" opacity="0.6" />
    <rect x="20" y="20" width="20" height="20" rx="10" fill="url(#accent)" />
  </g>
</svg>
